<!-- CONTACT SECTION -->
<section class="contact">
  <div class="contact-container">
    
    <h2 class="contact-heading">Contact Admissions</h2>
    <p class="contact-subheading">Have questions about enrollment? We're here to help.</p>
    
    <div class="contact-form-wrapper">
      <form id="contact-form" class="contact-form">
        
        <div class="form-group">
          <label for="contact-name">Full Name</label>
          <input 
            type="text" 
            id="contact-name" 
            name="name" 
            placeholder="Enter your full name"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="contact-email">Email</label>
          <input 
            type="email" 
            id="contact-email" 
            name="email" 
            placeholder="Enter your email"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="contact-interest">Area of Interest</label>
          <select id="contact-interest" name="interest" required>
            <option value="">Select a topic</option>
            <option value="enrollment">Enrollment &amp; Admissions</option>
            <option value="academics">Academic Programs</option>
            <option value="studentlife">Student Life</option>
            <option value="general">General Inquiry</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="contact-message">Message</label>
          <textarea 
            id="contact-message" 
            name="message" 
            rows="5" 
            placeholder="Tell us what you'd like to know..."
            required
          ></textarea>
        </div>
        
        <button type="submit" class="contact-btn">Send Message</button>
        
      </form>
    </div>
    
  </div>
</section>
